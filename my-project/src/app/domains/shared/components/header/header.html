<nav>
  <div class="w-full flex flex-wrap items-center justify-between mx-auto py-4">
    <div class="flex items-center space-x-8">
      <a href="https://www.google.com/" class="flex items-center">
        <img
          src="https://media.istockphoto.com/id/1303676225/vector/outlined-simple-and-adorable-white-maltese-dog-front-head-illustration.webp?s=1024x1024&w=is&k=20&c=_fkfApZxMzsvXm7NqzdPCGQ-ZnJQ63iGg2ku-R0RGqk="
          class="h-6 mr-3"
          alt="Cookie Logo"
        />
        <span class="self-center text-xl font-semibold whitespace-nowrap">Cookie's World</span>
      </a>
      <ul class="flex space-x-6">
        <li>
          <a href="#" class="block underline hover:underline" aria-current="page">Home</a>
        </li>
        <li>
          <a href="#" class="block hover:underline">About</a>
        </li>
        <li>
          <a href="#" class="block hover:underline">Services</a>
        </li>
      </ul>
    </div>
    <div class="flex items-center">
      <button class="p-2 border rounded relative" (click)="toogleSideMenu()">
        <div class="absolute -top-2 -left-2 rounded h-5 w-5 bg-black text-white text-xs">
          {{ cart.length }}
        </div>
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.5"
          stroke="currentColor"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M2.25 3h1.386c.51 0 .955.343 1.087.835l.383 1.437M7.5 14.25a3 3 0 00-3 3h15.75m-12.75-3h11.218c1.121-2.3 2.1-4.684 2.924-7.138a60.114 60.114 0 00-16.536-1.84M7.5 14.25L5.106 5.272M6 20.25a.75.75 0 11-1.5 0 .75.75 0 011.5 0zm12.75 0a.75.75 0 11-1.5 0 .75.75 0 011.5 0z"
          />
        </svg>
      </button>
    </div>
  </div>
</nav>

<div
  class="fixed border-l-4 top-0 right-0 bg-red z-40 w-72 h-screen p-4 overflow-y-auto transition-transform bg-white"
  [class.translate-x-full]="hideSideMenu()"
>
  <div class="flex justify-between items-center">
    <p class="text-xl">My Cart</p>
    <button (click)="toogleSideMenu()">
      <svg
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        stroke-width="1.5"
        stroke="currentColor"
        class="w-6 h-6"
      >
        <path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>
  <div class="space-y-4 my-4">
    @for (products of cart; track products.id) {
      <div>
        <a href="" class="flex items-center space-x-4 p-4 border-b">
          <img
            [src]="[products.imageUrl]"
            alt="product image"
            class="w-16 h-16 object-cover rounded"
          />
          <div>
            <h5 class="font-bold">{{products.name}}</h5>
            <h6 class="text-lg">${{products.price }}</h6>
          </div>
        </a>
      </div>
    }
    <a href="" class="flex items-center space-x-4 p-4 ">
      <p> Total:</p>
      <p> {{ total() | currency}} </p>

    </a>
  </div>
</div>
